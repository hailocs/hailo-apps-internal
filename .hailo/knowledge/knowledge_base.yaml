version: '1.0'

# Gen AI application recipes — proven patterns from real deployments
gen_ai_recipes:
  - id: recipe_001
    timestamp: '2026-03-18'
    app: vlm_chat
    pattern: continuous_monitoring_variant
    description: >
      Build a continuous monitoring app by reusing vlm_chat Backend class with
      a timer-based capture loop instead of interactive state machine.
      Key changes: remove state machine, add interval timer, add event parsing,
      add structured event log, add summary report.
    reference_prompt: .hailo/prompts/dog-monitor-app.prompt.md
    tags: [vlm, continuous-monitoring, event-detection, variant]

  - id: recipe_002
    timestamp: '2026-03-18'
    app: vlm_chat
    pattern: event_keyword_parsing
    description: >
      Parse VLM text responses into structured events using keyword matching.
      Define EVENT_KEYWORDS dict mapping EventType → list of keywords.
      Check response.lower() against each keyword list.
      Combine with cooldown timer to avoid duplicate alerts.
    tags: [vlm, event-detection, parsing, nlp]

  - id: recipe_003
    timestamp: '2026-03-18'
    app: gen_ai_apps
    pattern: backend_reuse
    description: >
      The vlm_chat Backend class is designed to be imported and reused.
      Customize via constructor args: system_prompt, max_tokens, temperature.
      Pass different user prompts per vlm_inference() call.
      Import: from hailo_apps.python.gen_ai_apps.vlm_chat.backend import Backend
    tags: [vlm, backend, reuse, architecture]

# GStreamer pipeline optimization recipes
pipeline_recipes:
  - id: pipeline_001
    timestamp: '2026-03-18'
    pattern: scheduler_timeout_for_cropper_hailonet
    description: >
      When hailonet with batch-size > 1 is inside a hailocropper path,
      it receives variable crop counts per frame. Without scheduler-timeout-ms,
      the batch waits indefinitely for crops that may never arrive.
      Fix: Set scheduler-timeout-ms to 1000/target_fps (e.g., 33 for 30fps).
    impact: "Latency reduction: 64% (257ms → 93ms) in gesture_detection"
    tags: [scheduler-timeout, hailonet, hailocropper, batch-size, latency]

# Bottleneck diagnosis patterns
bottleneck_patterns:
  - pattern: "hailonet highest proctime, downstream of hailocropper"
    diagnosis: Batch stall — variable crop count causes partial batch waiting
    fix: "Add scheduler-timeout-ms={1000/fps} to hailonet element"
    confidence: 0.95

  - pattern: "queue P50 low but P95 > 10x P50"
    diagnosis: Downstream element periodically blocks (not a queue sizing issue)
    fix: "Fix downstream bottleneck first, not the queue"
    confidence: 0.85

  - pattern: "videoconvert in top 3 proctime"
    diagnosis: CPU-bound pixel format conversion
    fix: "Increase n-threads to 3-4, consider NV12 format"
    confidence: 0.8

  - pattern: "all CPUs > 90%"
    diagnosis: Overall CPU saturation
    fix: "Reduce resolution or frame rate"
    confidence: 0.9

  - pattern: "bypass queue fill > 70%"
    diagnosis: Inference slower than source, frames backing up
    fix: "Increase bypass max_size_buffers, consider reducing source FPS"
    confidence: 0.8

# Insights — quick facts agents should know
insights:
  - text: "VLM expects RGB 336x336 with central crop, not letterbox padding"
    tags: [vlm, preprocessing, image]

  - text: "vlm.clear_context() MUST be called after each inference, or context accumulates and quality degrades"
    tags: [vlm, context, critical]

  - text: "Backend.close() must send None sentinel to worker process via request_queue to prevent orphaned processes"
    tags: [backend, multiprocessing, cleanup]

  - text: "QT_QPA_PLATFORM=xcb must be set BEFORE importing cv2 on headless Linux"
    tags: [opencv, display, environment]

  - text: "get_usb_video_devices() uses udevadm and filters virtual devices — returns device indices, not /dev paths"
    tags: [camera, usb, discovery]

  - text: "SHARED_VDEVICE_GROUP_ID enables multi-process device sharing. Without it, only one process can access the Hailo chip"
    tags: [vdevice, multiprocessing, critical]

  - text: "VLM token '<|im_end|>' must be filtered from streaming output"
    tags: [vlm, streaming, tokens]

  - text: "Camera release must happen in same thread as read() — cross-thread release can crash OpenCV"
    tags: [camera, threading, critical]
