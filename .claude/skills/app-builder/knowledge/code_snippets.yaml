proximity_alert:
  description: "Depth-based proximity detection with smoothing and cooldown"
  used_by: [depth_proximity_alert]
  when_to_use: "Obstacle avoidance, proximity warnings, safety zones around machinery"
  code: |
    import time
    import numpy as np

    ALERT_COOLDOWN_SECONDS = 1.0

    class ProximityAlertState(app_callback_class):
        def __init__(self, threshold=0.3, region=None):
            super().__init__()
            self.threshold = threshold
            self.region = region  # (x, y, w, h) normalized, or None for center 50%
            self.last_alert_time = 0.0
            self.alert_active = False
            self.depth_history = []
            self.history_len = 10

        def get_region_depth(self, depth_data):
            """Extract depth from ROI (center 50% by default)."""
            arr = np.array(depth_data)
            if arr.ndim < 2:
                return arr.flatten()
            h, w = arr.shape[:2]
            if self.region:
                rx, ry, rw, rh = self.region
                x1, y1 = int(rx * w), int(ry * h)
                x2, y2 = int((rx + rw) * w), int((ry + rh) * h)
            else:
                x1, y1, x2, y2 = w // 4, h // 4, 3 * w // 4, 3 * h // 4
            return arr[max(0,y1):min(h,y2), max(0,x1):min(w,x2)].flatten()

        def check_proximity(self, depth_values):
            """Returns (is_alert, smoothed_depth, current_depth)."""
            if len(depth_values) == 0:
                return False, 0.0, 0.0
            current = float(np.percentile(depth_values, 5))
            self.depth_history.append(current)
            if len(self.depth_history) > self.history_len:
                self.depth_history.pop(0)
            smoothed = float(np.mean(self.depth_history))
            return smoothed <= self.threshold, smoothed, current

    # In callback:
    # depth_masks = roi.get_objects_typed(hailo.HAILO_DEPTH_MASK)
