# Used by: workout_rep_counter, semaphore_translator, baby_sleep_monitor,
#          gesture_detection, and any pose-based app.

pose_keypoints:
  description: "COCO keypoint index map and pixel coordinate extraction"
  used_by: [workout_rep_counter, semaphore_translator, baby_sleep_monitor]
  when_to_use: "Any app that uses YOLOv8-pose and needs to work with specific body joints"
  code: |
    # COCO keypoint indices (17 keypoints)
    KEYPOINTS = {
        "nose": 0,
        "left_eye": 1,     "right_eye": 2,
        "left_ear": 3,     "right_ear": 4,
        "left_shoulder": 5, "right_shoulder": 6,
        "left_elbow": 7,   "right_elbow": 8,
        "left_wrist": 9,   "right_wrist": 10,
        "left_hip": 11,    "right_hip": 12,
        "left_knee": 13,   "right_knee": 14,
        "left_ankle": 15,  "right_ankle": 16,
    }

    def get_keypoint_pixel_coords(points, keypoint_name, bbox, width, height):
        """
        Extract pixel coordinates for a named keypoint.

        Args:
            points: list of landmark points from hailo (landmarks[0].get_points())
            keypoint_name: string key from KEYPOINTS dict
            bbox: HailoBBox from detection.get_bbox()
            width: frame width in pixels
            height: frame height in pixels

        Returns:
            (x, y) tuple in pixel coordinates, or None if not available.
        """
        idx = KEYPOINTS.get(keypoint_name)
        if idx is None or idx >= len(points):
            return None
        point = points[idx]
        x = (point.x() * bbox.width() + bbox.xmin()) * width
        y = (point.y() * bbox.height() + bbox.ymin()) * height
        return (x, y)

joint_angle_calculation:
  description: "Calculate angle at a joint from three keypoints (used for rep counting, posture analysis)"
  used_by: [workout_rep_counter, baby_sleep_monitor]
  when_to_use: "Any app that needs joint angles — exercise tracking, posture monitoring, ergonomics"
  code: |
    import math

    def calculate_angle(p1, p2, p3):
        """
        Calculate the angle at p2 formed by line segments p1-p2 and p2-p3.

        Args:
            p1: (x, y) first point
            p2: (x, y) vertex point (the joint)
            p3: (x, y) third point

        Returns:
            Angle in degrees (0-180).
        """
        v1 = (p1[0] - p2[0], p1[1] - p2[1])
        v2 = (p3[0] - p2[0], p3[1] - p2[1])

        dot = v1[0] * v2[0] + v1[1] * v2[1]
        mag1 = math.sqrt(v1[0] ** 2 + v1[1] ** 2)
        mag2 = math.sqrt(v2[0] ** 2 + v2[1] ** 2)

        if mag1 == 0 or mag2 == 0:
            return 0.0

        cos_angle = max(-1.0, min(1.0, dot / (mag1 * mag2)))
        return math.degrees(math.acos(cos_angle))

arm_angle_and_discretization:
  description: "Compute directional arm angle (0-360) and discretize to 45-degree steps"
  used_by: [semaphore_translator]
  when_to_use: "Gesture recognition, sign language, semaphore, any directional arm pose classification"
  code: |
    import math

    def compute_arm_angle(shoulder_x, shoulder_y, wrist_x, wrist_y):
        """
        Compute arm angle from shoulder to wrist.
        Returns angle in degrees (0-360):
          0 = straight down, 90 = right, 180 = up, 270 = left
        """
        dx = wrist_x - shoulder_x
        dy = wrist_y - shoulder_y  # positive = downward in image coords
        angle_rad = math.atan2(-dx, dy)  # clockwise from down
        angle_deg = math.degrees(angle_rad)
        if angle_deg < 0:
            angle_deg += 360.0
        return angle_deg

    def discretize_angle(angle, step=45):
        """Snap angle to nearest step-degree increment."""
        discrete = round(angle / step) * step
        if discrete >= 360:
            discrete = 0
        return int(discrete)

