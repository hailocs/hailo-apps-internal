# ============================================================================

signal_stabilization:
  description: "Require consistent classification for N frames before accepting (debounce)"
  used_by: [semaphore_translator]
  when_to_use: "Gesture recognition, signal decoding, any noisy per-frame classification that needs temporal smoothing"
  code: |
    class StabilizedClassifier:
        """Accept a classification only after seeing it for N consecutive frames."""
        def __init__(self, threshold=10):
            self.threshold = threshold
            self.last_value = None
            self.stable_count = 0
            self.confirmed_value = None

        def update(self, value):
            """Feed a new per-frame classification. Returns confirmed value or None."""
            if value == self.last_value:
                self.stable_count += 1
            else:
                self.last_value = value
                self.stable_count = 1

            if self.stable_count == self.threshold:
                self.confirmed_value = value
                return value  # Newly confirmed
            return None  # Not yet stable
