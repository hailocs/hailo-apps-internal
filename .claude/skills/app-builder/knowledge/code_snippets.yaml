zone_polygon:
  description: "Define polygon zones in normalized coords with point-in-polygon test"
  used_by: [parking_lot_occupancy, retail_shelf_analyzer]
  when_to_use: "Zone occupancy, region-of-interest counting, area-based alerts"
  code: |
    import json
    import numpy as np

    class Zone:
        """A polygon region in normalized [0,1] coordinates."""

        def __init__(self, name, polygon, capacity=1):
            self.name = name
            self.polygon = np.array(polygon, dtype=np.float32)
            self.capacity = capacity
            self.occupied_count = 0

        def contains_point(self, x, y):
            """Ray-casting point-in-polygon test."""
            n = len(self.polygon)
            inside = False
            j = n - 1
            for i in range(n):
                xi, yi = self.polygon[i]
                xj, yj = self.polygon[j]
                if ((yi > y) != (yj > y)) and \
                   (x < (xj - xi) * (y - yi) / (yj - yi) + xi):
                    inside = not inside
                j = i
            return inside

        def contains_bbox_center(self, xmin, ymin, width, height):
            """Check if bbox center falls in this zone."""
            cx = xmin + width / 2.0
            cy = ymin + height / 2.0
            return self.contains_point(cx, cy)

    def load_zones_from_json(json_path):
        """Load zones from JSON: [{"name": "A", "polygon": [[x,y],...], "capacity": 5}, ...]"""
        with open(json_path, "r") as f:
            data = json.load(f)
        return [Zone(e["name"], e["polygon"], e.get("capacity", 1)) for e in data]

    def get_default_zones():
        """Default 2x2 grid zones for demo."""
        return [
            Zone("Zone A", [[0, 0], [0.5, 0], [0.5, 0.5], [0, 0.5]], 4),
            Zone("Zone B", [[0.5, 0], [1, 0], [1, 0.5], [0.5, 0.5]], 4),
            Zone("Zone C", [[0, 0.5], [0.5, 0.5], [0.5, 1], [0, 1]], 4),
            Zone("Zone D", [[0.5, 0.5], [1, 0.5], [1, 1], [0.5, 1]], 4),
        ]

zone_overlay_drawing:
  description: "Draw zone polygons on frame with color-coded occupancy status"
  used_by: [parking_lot_occupancy]
  when_to_use: "Visual zone overlay for any zone-based app"
  code: |
    import cv2
    import numpy as np

    def draw_zones_on_frame(frame, zones, frame_width, frame_height):
        """Draw semi-transparent colored zone polygons with labels."""
        for zone in zones:
            is_full = zone.occupied_count >= zone.capacity

            # Scale normalized polygon to pixel coords
            pts = zone.polygon.copy()
            pts[:, 0] *= frame_width
            pts[:, 1] *= frame_height
            pts = pts.astype(np.int32)

            # Semi-transparent fill
            overlay = frame.copy()
            color = (0, 0, 255) if is_full else (0, 255, 0)
            cv2.fillPoly(overlay, [pts], color)
            cv2.addWeighted(overlay, 0.15, frame, 0.85, 0, frame)

            # Border
            cv2.polylines(frame, [pts], True, color, 2)

            # Label at centroid
            cx = int(pts[:, 0].mean())
            cy = int(pts[:, 1].mean())
            cv2.putText(frame, f"{zone.name}: {zone.occupied_count}/{zone.capacity}",
                        (cx - 40, cy), cv2.FONT_HERSHEY_SIMPLEX, 0.5, (255, 255, 255), 2)

