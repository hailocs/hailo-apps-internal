per_track_state:
  description: "Maintain per-tracked-object state across frames using a dict keyed by track ID"
  used_by: [workout_rep_counter, crowd_counting, parking_lot_occupancy]
  when_to_use: "Any app tracking state per object — counting, timing, classification history"
  code: |
    from hailo_apps.python.core.gstreamer.gstreamer_app import app_callback_class

    class TrackedObjectState:
        """State for one tracked object. Customize fields per app."""
        def __init__(self):
            self.first_seen_frame = 0
            self.data = {}  # app-specific state

    class TrackingCallbackData(app_callback_class):
        def __init__(self):
            super().__init__()
            self.track_states = {}  # {track_id: TrackedObjectState}

        def get_or_create(self, track_id):
            if track_id not in self.track_states:
                self.track_states[track_id] = TrackedObjectState()
                self.track_states[track_id].first_seen_frame = self.get_count()
            return self.track_states[track_id]

        def cleanup_stale(self, active_ids, max_age=300):
            """Remove states for objects not seen in max_age frames."""
            current_frame = self.get_count()
            stale = [tid for tid, s in self.track_states.items()
                     if tid not in active_ids
                     and (current_frame - s.first_seen_frame) > max_age]
            for tid in stale:
                del self.track_states[tid]

custom_cli_args:
  description: "Pattern for adding custom CLI arguments that work with the pipeline parser"
  used_by: [crowd_counting, parking_lot_occupancy, depth_proximity_alert]
  when_to_use: "Any app that needs custom command-line options beyond the base pipeline args"
  code: |
    # In main():
    from hailo_apps.python.core.common.core import get_pipeline_parser

    parser = get_pipeline_parser()
    parser.add_argument("--my-threshold", type=float, default=0.5,
                        help="Custom threshold value")
    parser.add_argument("--my-config", default=None,
                        help="Path to custom config JSON")

    # Pre-parse to get custom args before pipeline construction
    args, _ = parser.parse_known_args()

    # Pass to callback state
    user_data = MyCallbackData(threshold=args.my_threshold)
    # Pass parser to pipeline app so it owns the full arg set
    app = GStreamerMyApp(app_callback, user_data, parser=parser)
    app.run()

