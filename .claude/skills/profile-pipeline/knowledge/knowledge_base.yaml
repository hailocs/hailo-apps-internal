version: '1.0'
tuning_recipes:
- id: recipe_001
  timestamp: '2026-03-10T12:28:10.961935'
  app: gesture_detection/pose_hand_detection
  change: Added scheduler-timeout-ms=33 to hand_landmark_hailonet (batch-size=2 kept). The hand landmark model (224x224, single
    context) inside hailocropper receives sparse crops (0-2 per frame). Without a timeout, batch-size=2 stalls waiting for
    a second crop that rarely arrives, causing 34ms mean proctime dominated by wait time. Setting timeout to 33ms (one frame
    at 30fps) lets the scheduler fire with partial batches.
  metrics_before:
    hand_landmark_hailonet_mean_us: 34012
    hand_hailonet_q_mean_us: 18315
    hand_scale_q_avg_fill_pct: 25.5
    palm_bypass_q_avg_fill_pct: 24.7
    e2e_latency_mean_us: 256532
  metrics_after:
    hand_landmark_hailonet_mean_us: 37004
    hand_hailonet_q_mean_us: 338
    hand_scale_q_avg_fill_pct: 4.5
    palm_bypass_q_avg_fill_pct: 4.8
    e2e_latency_mean_us: 93235
  improvement: see metrics
  tags:
  - scheduler-timeout,hailonet,batch-size,hailocropper,hand-landmark,latency
bottleneck_patterns:
- pattern: queue_fill_pct > 80 on bypass queue
  suggestion: Increase bypass queue max_size_buffers (INFERENCE_PIPELINE_WRAPPER default is 20)
  confidence: 0.8
  times_confirmed: 0
- pattern: videoconvert in top 3 proctime
  suggestion: Increase n-threads to 3-4, consider using NV12 format to reduce conversion overhead
  confidence: 0.8
  times_confirmed: 0
- pattern: videoscale in top 3 proctime
  suggestion: Increase n-threads to 3-4, reduce input resolution at source if possible
  confidence: 0.7
  times_confirmed: 0
- pattern: hailonet highest proctime
  suggestion: Tune batch-size and scheduler-timeout-ms, verify HEF model is optimized for target arch
  confidence: 0.9
  times_confirmed: 0
- pattern: element proctime p95 > 2x mean
  suggestion: Add leaky queue before element to absorb jitter spikes
  confidence: 0.7
  times_confirmed: 0
- pattern: all_cpus > 90%
  suggestion: Reduce source resolution or frame rate, pipeline is CPU-bound
  confidence: 0.9
  times_confirmed: 0
