- text: When hailonet is inside a hailocropper path, batch-size>1 without scheduler-timeout-ms causes severe stalls. The number
    of crops per frame is variable (depends on detections), so the batch often waits indefinitely for more crops. Always set
    scheduler-timeout-ms on hailonet elements downstream of hailocropper. Use 1000/target_fps as the timeout value (e.g. 33ms
    for 30fps).
  tags:
  - hailonet,hailocropper,scheduler-timeout,batch-size,best-practice
  timestamp: '2026-03-10'
- text: "High queue proctime with low median but high P95 (e.g. palm_bypass_q: P50=1.5ms, P95=50ms) indicates the queue is\
    \ mostly empty but periodically blocked waiting for a downstream element. Look at what's downstream \u2014 if it's a hailonet\
    \ with batch stalls, fixing the batch/scheduler issue fixes the queue too."
  tags:
  - queue,proctime,jitter,diagnosis
  timestamp: '2026-03-10'
