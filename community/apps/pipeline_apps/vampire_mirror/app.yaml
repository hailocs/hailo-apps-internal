name: vampire_mirror
title: "Vampire Mirror"
description: >
  A real-time mirror where enrolled "vampires" are invisible. Uses instance
  segmentation with ByteTrack tracking for pixel-accurate person masks.
  Features dynamic background updates, portrait center-crop display with
  a buffer zone for smooth entry handling. Face recognition integration
  planned for vampire identification.
